<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Debug / Logs - Whatnot Monitor</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .debug-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .debug-info {
      background: var(--card-bg);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .log-entry {
      background: var(--card-bg);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .log-header {
      padding: 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-header:hover { background: rgba(255,255,255,0.05); }
    .log-summary { flex: 1; }
    .log-timestamp { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.25rem; }
    .log-message { font-weight: 500; }
    .log-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-change    { background: var(--success); color: white; }
    .badge-no-change { background: var(--text-muted); color: white; }
    .badge-rollup    { background: var(--primary); color: white; }
    .badge-error     { background: var(--danger); color: white; }
    .log-details {
      display: none;
      padding: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
    }
    .log-details.expanded { display: block; }
    .detail-row { display: flex; margin-bottom: 0.5rem; }
    .detail-label { color: var(--text-muted); width: 150px; flex-shrink: 0; }
    .detail-value { color: var(--text); }
    .change-item {
      background: rgba(255,255,255,0.05);
      padding: 0.5rem;
      border-radius: 4px;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .change-type {
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    .nav-link { color: var(--primary); text-decoration: none; }
    .nav-link:hover { text-decoration: underline; }
    .expand-icon { transition: transform 0.2s; color: var(--text-muted); }
    .log-header.expanded .expand-icon { transform: rotate(180deg); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="debug-header">
        <div>
          <h1>Debug / Logs</h1>
          <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        </div>
        <button id="refreshLogs" class="btn btn-primary">Refresh</button>
      </div>
    </header>

    <div class="debug-info">
      Internal logs for each show-check run and Slack notifications.
      'No change' runs are rolled up so you don't see hundreds of identical entries.
    </div>

    <div id="logEntries">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading logs...</p>
      </div>
    </div>
  </div>

  <script>
    function formatTimestamp(iso) {
      if (!iso) return 'Unknown';
      try {
        return new Date(iso).toLocaleString('en-US', {
          timeZone: 'America/New_York',
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: true,
        }) + ' ET';
      } catch { return iso; }
    }

    function createLogEntry(entry) {
      const div = document.createElement('div');
      div.className = 'log-entry';

      const isRollup = !entry.has_changes && entry.checks_count > 1;
      const hasErrors = entry.details_json?.has_errors || false;

      let badgeClass = 'badge-no-change', badgeText = 'No Change';
      if (hasErrors)         { badgeClass = 'badge-error';     badgeText = 'Error'; }
      else if (entry.has_changes) { badgeClass = 'badge-change'; badgeText = 'Changes'; }
      else if (isRollup)    { badgeClass = 'badge-rollup';    badgeText = `${entry.checks_count} Checks`; }

      const ts = entry.first_timestamp === entry.last_timestamp || entry.checks_count === 1
        ? formatTimestamp(entry.first_timestamp)
        : `${formatTimestamp(entry.first_timestamp)} – ${formatTimestamp(entry.last_timestamp)}`;

      div.innerHTML = `
        <div class="log-header" onclick="toggleDetails('${entry.id}')">
          <div class="log-summary">
            <div class="log-timestamp">${ts}</div>
            <div class="log-message">${entry.summary}</div>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span class="log-badge ${badgeClass}">${badgeText}</span>
            <span class="expand-icon">▼</span>
          </div>
        </div>
        <div class="log-details" id="details-${entry.id}">
          ${renderDetails(entry)}
        </div>
      `;

      return div;
    }

    function renderDetails(entry) {
      const d = entry.details_json || {};
      let html = '';

      html += `<div class="detail-row"><span class="detail-label">Checks Count:</span><span class="detail-value">${entry.checks_count}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">First Check:</span><span class="detail-value">${formatTimestamp(entry.first_timestamp)}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Last Check:</span><span class="detail-value">${formatTimestamp(entry.last_timestamp)}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Shows Seen:</span><span class="detail-value">${d.total_shows_seen || 0}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">New Shows:</span><span class="detail-value">${d.new_shows_count || 0}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Updated Shows:</span><span class="detail-value">${d.updated_shows_count || 0}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Slack Posts:</span><span class="detail-value">${d.slack_posts_count || 0}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Slack Triggered:</span><span class="detail-value">${d.slack_triggered ? 'Yes' : 'No'}</span></div>`;

      if (d.has_errors && d.errors?.length > 0) {
        html += '<div style="margin-top:1rem;"><strong style="color:var(--danger);">Errors:</strong></div>';
        for (const e of d.errors) {
          html += `<div class="change-item" style="border-left:3px solid var(--danger);">${e}</div>`;
        }
      }

      if (d.changes?.length > 0) {
        html += '<div style="margin-top:1rem;"><strong>Changes:</strong></div>';
        for (const c of d.changes) {
          html += `
            <div class="change-item">
              <span class="change-type">${c.type === 'new_show' ? 'New Show' : 'Updated Show'}</span>
              <div><strong>${c.title}</strong></div>
              <div style="color:var(--text-muted);font-size:0.8rem;">@${c.username} • ${c.show_id}</div>
              ${c.changes ? `<div style="margin-top:0.25rem;font-size:0.85rem;">Changes: ${JSON.stringify(c.changes)}</div>` : ''}
            </div>
          `;
        }
      } else if (!entry.has_changes) {
        html += '<div style="margin-top:1rem;color:var(--text-muted);">No new or updated shows during this period.</div>';
      }

      return html;
    }

    function toggleDetails(id) {
      const details = document.getElementById('details-' + id);
      const header = details.previousElementSibling;
      details.classList.toggle('expanded');
      header.classList.toggle('expanded');
    }

    async function loadLogs() {
      const container = document.getElementById('logEntries');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading logs...</p></div>';
      try {
        const res = await fetch('/api/logs');
        const logs = await res.json();
        container.innerHTML = '';
        if (logs.length === 0) {
          container.innerHTML = '<div class="debug-info">No logs yet. Trigger a check to see logs here.</div>';
          return;
        }
        for (const entry of logs) container.appendChild(createLogEntry(entry));
      } catch (err) {
        container.innerHTML = `<div class="debug-info" style="color:var(--danger);">Error loading logs: ${err.message}</div>`;
      }
    }

    document.getElementById('refreshLogs').addEventListener('click', loadLogs);
    loadLogs();
  </script>
</body>
</html>
